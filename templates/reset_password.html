{% extends "base.html" %}
{% block content %}
<div class="auth-container mt-5">
    <div class="text-center mb-4">
        <h2>Reset Password</h2>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" class="auth-form">
        <label>New Password</label>
        <div class="position-relative">
            <input type="password" name="password" id="newPassword" placeholder="Min 8 chars, mix of upper, lower, number, special" required>
            <i class="bi bi-eye-fill toggle-password" onclick="togglePassword('newPassword')"></i>
        </div>

        <label>Confirm Password</label>
        <div class="position-relative">
            <input type="password" name="confirm_password" id="confirmPassword" required>
            <i class="bi bi-eye-fill toggle-password" onclick="togglePassword('confirmPassword')"></i>
        </div>

        <button type="submit" class="btn btn-success w-100 mt-3">Reset Password</button>
    </form>
</div>

<script>
function togglePassword(id) {
    const input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
}

// Client-side validation
const form = document.querySelector("form");
form.addEventListener("submit", function(e){
    const pw = document.getElementById("newPassword").value;
    const confirmPw = document.getElementById("confirmPassword").value;
    const regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,}$/;
    if(!regex.test(pw)) { 
        e.preventDefault(); 
        alert("Password must have at least 8 characters, including uppercase, lowercase, number, and special character."); 
    } else if(pw !== confirmPw) { 
        e.preventDefault(); 
        alert("Passwords do not match!"); 
    }
});
</script>
{% endblock %}
